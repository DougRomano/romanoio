<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="codeBlockBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="200" y1="0" x2="200" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#60a5fa" stroke-width="1"/>
  </g>

  <!-- Glow accents -->
  <circle cx="1050" cy="80" r="120" fill="#3b82f6" opacity="0.05"/>
  <circle cx="100" cy="580" r="80" fill="#60a5fa" opacity="0.03"/>

  <!-- Code block card -->
  <rect x="710" y="110" width="430" height="360" rx="12" fill="url(#codeBlockBg)" stroke="#1e3a8a" stroke-width="1" opacity="0.9"/>

  <!-- Window dots -->
  <circle cx="738" cy="138" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="758" cy="138" r="6" fill="#eab308" opacity="0.7"/>
  <circle cx="778" cy="138" r="6" fill="#22c55e" opacity="0.7"/>

  <!-- Before/after token table -->
  <text x="738" y="176" font-family="monospace" font-size="12" fill="#6b7280">// Always-loaded context</text>

  <text x="738" y="206" font-family="monospace" font-size="12" fill="#94a3b8">Component         Before    After</text>
  <line x1="738" y1="214" x2="1110" y2="214" stroke="#374151" stroke-width="1"/>

  <text x="738" y="234" font-family="monospace" font-size="12" fill="#d1d5db">CLAUDE.md         </text>
  <text x="898" y="234" font-family="monospace" font-size="12" fill="#f87171">564 ln</text>
  <text x="978" y="234" font-family="monospace" font-size="12" fill="#4ade80">23 ln</text>

  <text x="738" y="256" font-family="monospace" font-size="12" fill="#d1d5db">Memory files      </text>
  <text x="898" y="256" font-family="monospace" font-size="12" fill="#f87171">561 ln</text>
  <text x="978" y="256" font-family="monospace" font-size="12" fill="#4ade80">0 ln</text>

  <text x="738" y="278" font-family="monospace" font-size="12" fill="#d1d5db">Cursor rules      </text>
  <text x="898" y="278" font-family="monospace" font-size="12" fill="#f87171">228 ln</text>
  <text x="978" y="278" font-family="monospace" font-size="12" fill="#4ade80">92 ln</text>

  <text x="738" y="300" font-family="monospace" font-size="12" fill="#d1d5db">constitution.md   </text>
  <text x="898" y="300" font-family="monospace" font-size="12" fill="#f87171">344 ln</text>
  <text x="978" y="300" font-family="monospace" font-size="12" fill="#4ade80">211 ln</text>

  <line x1="738" y1="312" x2="1110" y2="312" stroke="#374151" stroke-width="1"/>
  <text x="738" y="332" font-family="monospace" font-size="13" font-weight="bold" fill="#d1d5db">Total             </text>
  <text x="898" y="332" font-family="monospace" font-size="13" fill="#f87171">~1,797 ln</text>
  <text x="978" y="332" font-family="monospace" font-size="13" fill="#4ade80">~326 ln</text>

  <!-- Big reduction number -->
  <text x="738" y="388" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#6b7280">Reduction:</text>
  <text x="840" y="388" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="40" fill="#4ade80">-82%</text>

  <text x="738" y="432" font-family="monospace" font-size="12" fill="#6b7280">// On-demand: 1,191 lines (7 skills)</text>
  <text x="738" y="452" font-family="monospace" font-size="12" fill="#6b7280">// Knowledge grew. Cost shrank.</text>

  <!-- Cursor -->
  <rect x="738" y="462" width="8" height="14" fill="#60a5fa" opacity="0.7"/>

  <!-- Series label -->
  <text x="70" y="148" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="13" fill="#60a5fa" letter-spacing="3">AI CONTEXT ENGINEERING · PART 2 OF 4</text>
  <rect x="70" y="160" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.6"/>

  <!-- Title -->
  <text x="70" y="235" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="46" fill="#f3f4f6">Monolith to</text>
  <text x="70" y="292" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="46" fill="#f3f4f6">Skills</text>
  <text x="70" y="349" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="46" fill="#60a5fa">Architecture</text>

  <!-- Subtitle -->
  <text x="70" y="395" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="17" fill="#9ca3af">An 82% reduction in always-loaded AI context.</text>

  <!-- Tags -->
  <rect x="70" y="442" width="115" height="32" rx="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <text x="128" y="463" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Claude Code</text>

  <rect x="200" y="442" width="72" height="32" rx="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <text x="236" y="463" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">.NET</text>

  <rect x="287" y="442" width="120" height="32" rx="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <text x="347" y="463" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Architecture</text>

  <!-- Bottom bar -->
  <line x1="70" y1="560" x2="1130" y2="560" stroke="#1e293b" stroke-width="1"/>
  <text x="70" y="590" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="16" fill="#d1d5db">romano.io</text>
  <text x="163" y="590" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="14" fill="#6b7280">  ·  AI, .NET &amp; Agentic Development</text>
  <text x="1130" y="590" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="14" fill="#6b7280" text-anchor="end">March 24, 2026</text>
</svg>
