  <text x="70" y="412" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8">Versioned constitution</text>
  <text x="70" y="434" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8">Explicit precedence declarations</text>
  <text x="70" y="456" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8">Lightweight amendment process</text>

  <!-- Tags -->
  <rect x="70" y="490" width="115" height="32" rx="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <text x="128" y="511" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Claude Code</text>

  <rect x="200" y="490" width="72" height="32" rx="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <text x="236" y="511" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">.NET</text>

  <rect x="287" y="490" width="120" height="32" rx="16" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
  <text x="347" y="511" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Governance</text>

  <!-- Bottom bar -->
  <line x1="70" y1="560" x2="1130" y2="560" stroke="#1e293b" stroke-width="1"/>
  <text x="70" y="590" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="16" fill="#d1d5db">romano.io</text>
  <text x="163" y="590" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="14" fill="#6b7280">  ·  AI, .NET &amp; Agentic Development</text>
  <text x="1130" y="590" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="14" fill="#6b7280" text-anchor="end">March 26, 2026</text>
