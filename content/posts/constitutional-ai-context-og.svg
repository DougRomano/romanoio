  <text x="752" y="208" font-family="monospace" font-size="11" fill="#93c5fd">Tier 1: CLAUDE.md</text>
  <text x="752" y="222" font-family="monospace" font-size="10" fill="#6b7280">router only · ~20 lines · beats nothing</text>

  <!-- Connector -->
  <line x1="750" y1="226" x2="750" y2="242" stroke="#374151" stroke-width="1"/>
  <polygon points="746,242 754,242 750,248" fill="#374151"/>

  <!-- Tier 2 -->
  <rect x="738" y="252" width="370" height="34" rx="4" fill="#1d4ed8" opacity="0.35"/>
