  <rect x="738" y="372" width="370" height="34" rx="4" fill="#1d4ed8" opacity="0.12"/>
  <rect x="738" y="372" width="4" height="34" rx="2" fill="#475569"/>
  <text x="752" y="388" font-family="monospace" font-size="11" fill="#94a3b8">Tier 4: .cursor/rules/*.mdc</text>
  <text x="752" y="402" font-family="monospace" font-size="10" fill="#6b7280">hints only · remind, never govern</text>

  <line x1="738" y1="420" x2="1108" y2="420" stroke="#374151" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="738" y="440" font-family="monospace" font-size="11" fill="#6b7280">// Every file declares its own authority.</text>
  <text x="738" y="458" font-family="monospace" font-size="11" fill="#4ade80">// Conflict resolution: tier wins.</text>
  <text x="738" y="476" font-family="monospace" font-size="11" fill="#6b7280">// 8 months. Zero silent contradictions.</text>

  <!-- Cursor -->
  <rect x="738" y="485" width="8" height="14" fill="#60a5fa" opacity="0.7"/>

  <!-- Series label -->
  <text x="70" y="148" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="13" fill="#60a5fa" letter-spacing="3">AI CONTEXT ENGINEERING · PART 4 OF 4</text>
  <rect x="70" y="160" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.6"/>

  <!-- Title -->
  <text x="70" y="240" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="52" fill="#f3f4f6">Constitutional</text>
  <text x="70" y="305" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="52" fill="#60a5fa">AI Context</text>

  <!-- Subtitle -->
  <text x="70" y="358" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="17" fill="#9ca3af">How to structure rules that don't drift.</text>

