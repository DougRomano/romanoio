  <text x="752" y="328" font-family="monospace" font-size="11" fill="#e2e8f0">/api-patterns  /ui-conversion  /datatables</text>
  <text x="752" y="342" font-family="monospace" font-size="10" fill="#6b7280">skills · on-demand · evolve independently</text>

  <!-- Connector -->
  <line x1="750" y1="346" x2="750" y2="362" stroke="#374151" stroke-width="1"/>
  <polygon points="746,362 754,362 750,368" fill="#374151"/>

