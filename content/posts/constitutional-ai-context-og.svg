  <circle cx="758" cy="138" r="6" fill="#eab308" opacity="0.7"/>
  <circle cx="778" cy="138" r="6" fill="#22c55e" opacity="0.7"/>

  <!-- Hierarchy tree -->
  <text x="738" y="176" font-family="monospace" font-size="12" fill="#6b7280">// 4-tier governance model</text>

  <!-- Tier 1 -->
  <rect x="738" y="192" width="370" height="34" rx="4" fill="#1d4ed8" opacity="0.25"/>
