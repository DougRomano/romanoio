  <text x="752" y="268" font-family="monospace" font-size="11" fill="#bfdbfe">Tier 2: constitution.md  v1.10.0</text>
  <text x="752" y="282" font-family="monospace" font-size="10" fill="#6b7280">principles · versioned · highest authority</text>

  <!-- Connector -->
  <line x1="750" y1="286" x2="750" y2="302" stroke="#374151" stroke-width="1"/>
  <polygon points="746,302 754,302 750,308" fill="#374151"/>

  <!-- Tier 3 -->
  <rect x="738" y="312" width="370" height="34" rx="4" fill="#1d4ed8" opacity="0.2"/>
