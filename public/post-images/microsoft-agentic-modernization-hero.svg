<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#5b8def"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="64" y="92" fill="#7c4dff" font-size="22" font-weight="700" letter-spacing="3">.NET MODERNIZATION · PRACTITIONER NOTES</text>

  <!-- headline -->
  <text x="64" y="160" fill="#f3f5fa" font-size="52" font-weight="800">Microsoft modernized a WinForms</text>
  <text x="64" y="222" fill="#f3f5fa" font-size="52" font-weight="800">LOB app on stage in <tspan fill="#5b8def">12 minutes</tspan>.</text>
  <text x="64" y="296" fill="#aeb6c7" font-size="34" font-weight="600">I've been doing it for <tspan fill="#f3f5fa" font-weight="800">nine months</tspan>.</text>

  <!-- divider -->
  <line x1="64" y1="346" x2="1136" y2="346" stroke="#2a3242" stroke-width="2"/>

  <!-- Got Right column -->
  <g>
    <circle cx="92" cy="404" r="20" fill="#1f3b2c"/>
    <path d="M83 404 l7 7 l13 -15" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="402" fill="#4ade80" font-size="26" font-weight="800">WHAT THEY GOT RIGHT</text>
    <text x="128" y="446" fill="#c7cedb" font-size="22">Modernize without the rewrite</text>
    <text x="128" y="482" fill="#c7cedb" font-size="22">Copilot Modernize CLI + batch &amp; CI/CD</text>
    <text x="128" y="518" fill="#c7cedb" font-size="22">Aspire onboarding, Foundry post-migration</text>
    <text x="128" y="554" fill="#c7cedb" font-size="22">Encode your org's patterns as skills</text>
  </g>

  <!-- vertical divider -->
  <line x1="612" y1="372" x2="612" y2="572" stroke="#2a3242" stroke-width="2"/>

  <!-- Skipped column -->
  <g>
    <circle cx="660" cy="404" r="20" fill="#3b2a1f"/>
    <path d="M652 396 l16 16 M668 396 l-16 16" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <text x="696" y="402" fill="#fbbf24" font-size="26" font-weight="800">WHAT THEY SKIPPED</text>
    <text x="696" y="446" fill="#c7cedb" font-size="22">Business-rule extraction</text>
    <text x="696" y="482" fill="#c7cedb" font-size="22">Stored procs → Dapper fidelity</text>
    <text x="696" y="518" fill="#c7cedb" font-size="22">The test coverage you don't have</text>
    <text x="696" y="554" fill="#c7cedb" font-size="22">Infragistics / DevExpress controls</text>
  </g>

  <!-- footer brand -->
  <text x="1136" y="606" text-anchor="end" fill="#5b6677" font-size="20" font-weight="600">romano.io · Doug Romano</text>
</svg>
